<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />

    <title>Hermes Chat UI</title>
    <meta
      name="description"
      content="Premium and secure web interface for local autonomous conversation with your Hermes Agent running on your NAS."
    />
    <meta name="version" content="2.1.0" />

    <!-- PWA & Apple Web App Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1C1C1C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Preconnect Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100vw;
          height: 100vh;
          margin: 0;
          background-color: #1C1C1C;
          color: #FFFFFF;
          font-family: "Space Grotesk", sans-serif;
        }
        .loader-text {
          font-weight: 700;
          font-size: 18px;
          letter-spacing: -0.5px;
          text-transform: uppercase;
        }
      </style>
      <div class="initial-loader">
        <div class="loader-text">INITIALIZING HERMES CHAT UI...</div>
      </div>
    </div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
