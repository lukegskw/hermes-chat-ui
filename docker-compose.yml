version: "3.8"

services:
  hermes:
    image: ${DOCKER_IMAGE:-ghcr.io/lucasgiglio/hermes-chat-ui:latest}
    container_name: hermes
    ports:
      - "${PORT:-8643}:8643"
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_API_KEY=${HERMES_API_KEY:-hermes-secure-api-key-2026}
    restart: unless-stopped

volumes:
  hermes-data:
