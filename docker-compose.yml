version: '3.8'

services:
  hermes-chat-ui:
    image: ${DOCKER_IMAGE:-ghcr.io/lucasgiglio/hermes-chat-ui:latest}
    container_name: hermes-chat-ui
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - HERMES_API_URL=${HERMES_API_URL:-http://localhost:8642}
      - HERMES_API_KEY=${HERMES_API_KEY:-hermes-secure-api-key-2026}
    restart: unless-stopped
